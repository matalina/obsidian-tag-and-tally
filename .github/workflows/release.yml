name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify release artifacts
        run: |
          for f in dist/main.js dist/manifest.json dist/styles.css; do
            if [ ! -f "$f" ]; then
              echo "Error: missing $f after build" >&2
              exit 1
            fi
          done

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            dist/main.js
            dist/styles.css
            dist/manifest.json

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/main.js \
            dist/manifest.json \
            dist/styles.css \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
